name: Send Daily Tech News

on:
  schedule:
    - cron: '0 0 * * *'  # UTC时间0点=北京时间8点
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Install requirements
      run: pip install requests
    - name: Run script
      env:
        QQ_EMAIL: ${{ secrets.QQ_EMAIL }}
        QQ_SMTP_PASS: ${{ secrets.QQ_SMTP_PASS }}
        RECEIVER: ${{ secrets.RECEIVER }}
        # 其它API密钥如百度翻译
      run: python send_tech_news.py